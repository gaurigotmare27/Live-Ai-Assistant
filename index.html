<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI Console</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #06040f;
            --mesh-color-1: #180d38;
            --mesh-color-2: #05030c;
            --mesh-color-3: #7b2cbf;
            --mesh-color-4: #00f0ff;
            --card-glass: rgba(14, 10, 32, 0.45);
            --card-border: rgba(255, 255, 255, 0.06);
            --accent-primary: #8a2be2; 
            --accent-primary-glow: rgba(138, 43, 226, 0.45);
            --accent-secondary: #00f0ff;
            --accent-secondary-glow: rgba(0, 240, 255, 0.45);
            --accent-tertiary: #ff007f;
            --accent-tertiary-glow: rgba(255, 0, 127, 0.45);
            --accent-success: #39ff14;
            --accent-success-glow: rgba(57, 255, 20, 0.4);
            --accent-warning: #ffaa00;
            --accent-warning-glow: rgba(255, 170, 0, 0.4);
            --text-main: #ffffff;
            --text-muted: #9d96b8;
            --font-display: 'Space Grotesk', sans-serif;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --border-radius-large: 32px;
            --border-radius-medium: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: radial-gradient(at 0% 0%, var(--mesh-color-1) 0px, transparent 55%),
                        radial-gradient(at 100% 0%, rgba(123, 44, 191, 0.15) 0px, transparent 55%),
                        radial-gradient(at 100% 100%, rgba(0, 240, 255, 0.12) 0px, transparent 55%),
                        radial-gradient(at 0% 100%, rgba(255, 0, 127, 0.12) 0px, transparent 55%),
                        var(--mesh-color-2);
            background-size: 200% 200%;
            animation: meshFlow 20s ease infinite alternate;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes meshFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 100%; }
        }

        /* Ambient Glowing Particles */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(140px);
            opacity: 0.18;
        }

        .glow-1 {
            background: var(--accent-primary);
            top: -150px;
            left: -150px;
            animation: floatOrb 25s infinite alternate;
        }

        .glow-2 {
            background: var(--accent-secondary);
            bottom: -200px;
            right: -150px;
            animation: floatOrb 30s infinite alternate-reverse;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, 50px) scale(1.15); }
            100% { transform: translate(-50px, 80px) scale(0.9); }
        }

        /* Main Glass Layout Capsule */
        .console-container {
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            display: grid;
            grid-template-columns: 85px 1fr 340px;
            gap: 20px;
            z-index: 2;
            position: relative;
        }

        /* 1. FLOATING NEURAL DOCK (Sidebar) */
        .dock-panel {
            background: rgba(14, 10, 32, 0.6);
            backdrop-filter: blur(40px) saturate(160%);
            -webkit-backdrop-filter: blur(40px) saturate(160%);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-large);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .dock-brand {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px var(--accent-primary-glow);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dock-brand:hover {
            transform: rotate(45deg) scale(1.05);
            box-shadow: 0 0 30px var(--accent-secondary-glow);
        }

        .dock-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            align-items: center;
        }

        .dock-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .dock-btn:hover, .dock-btn.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transform: scale(1.08);
        }

        /* Tooltips for Dock buttons */
        .dock-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 65px;
            background: rgba(10, 6, 22, 0.9);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.72rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            transform: translateX(-5px);
            font-family: var(--font-display);
        }

        .dock-btn:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* 2. CORE VIEWPORT (Main Panel) */
        .core-viewport {
            background: var(--card-glass);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-large);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Floating Space Nebula Header */
        .core-header {
            padding: 24px 30px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.01), transparent);
        }

        .core-identity {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .core-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .core-subtitle {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Quantum AI Consciousness Orb Container */
        .orb-control-hub {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .quantum-orb-wrapper {
            position: relative;
            width: 58px;
            height: 58px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quantum-orb {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            box-shadow: 0 0 25px var(--accent-primary-glow), 0 0 50px rgba(0, 240, 255, 0.15);
            animation: morphBlob 6s ease-in-out infinite alternate, spin 18s linear infinite;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes morphBlob {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .quantum-orb.thinking {
            background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-warning));
            box-shadow: 0 0 25px var(--accent-tertiary-glow), 0 0 50px rgba(255, 170, 0, 0.2);
            animation: morphBlob 2s ease-in-out infinite alternate, spin 5s linear infinite;
            transform: scale(1.1);
        }

        .orb-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .orb-status-text {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .orb-status-val {
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--accent-secondary);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            font-family: var(--font-display);
        }

        /* Floating Sessions Panel in Core */
        .sessions-tray {
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.15);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .sessions-tray::-webkit-scrollbar {
            height: 2px;
        }

        .tray-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 6px 14px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tray-item:hover, .tray-item.active {
            background: rgba(255, 0, 127, 0.05);
            border-color: var(--accent-tertiary);
            color: var(--text-main);
        }

        .tray-item.active {
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.15);
        }

        .tray-delete {
            opacity: 0.4;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .tray-delete:hover {
            opacity: 1;
            color: #ef4444;
        }

        /* Dynamic Chat Window */
        .chat-viewport {
            flex: 1;
            padding: 24px 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-row {
            display: flex;
            width: 100%;
            animation: slideFadeIn 0.3s ease-out;
        }

        @keyframes slideFadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-row.user { justify-content: flex-end; }
        .chat-row.assistant { justify-content: flex-start; }
        .chat-row.system { justify-content: center; }

        .chat-bubble {
            max-width: 78%;
            padding: 16px 20px;
            border-radius: 24px;
            font-size: 0.92rem;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .chat-row.user .chat-bubble {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.18), rgba(255, 0, 127, 0.1));
            border: 1px solid rgba(138, 43, 226, 0.45);
            color: var(--text-main);
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.08);
        }

        .chat-row.assistant .chat-bubble {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.06), rgba(14, 10, 32, 0.4));
            border: 1px solid rgba(0, 240, 255, 0.25);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.04);
        }

        .chat-row.assistant .chat-bubble::before {
            content: '';
            position: absolute;
            left: -1px; top: -1px; width: 10px; height: 10px;
            border-left: 2px solid var(--accent-secondary);
            border-top: 2px solid var(--accent-secondary);
        }

        .chat-row.system .chat-bubble {
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 10px 20px;
            border-radius: var(--border-radius-medium);
            text-align: center;
        }

        .bubble-time {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: right;
        }

        .chat-row.assistant .bubble-time {
            text-align: left;
        }

        /* Typewriter text cursor */
        .typing-effect { position: relative; }
        .typing-effect::after {
            content: "█";
            color: var(--accent-secondary);
            font-family: var(--font-mono);
            font-size: 0.95rem;
            animation: pulse-cursor 0.8s infinite alternate;
            margin-left: 2px;
            display: inline-block;
        }

        @keyframes pulse-cursor {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Animated Reasoning Steps Card */
        .reasoning-bubble {
            background: rgba(10, 6, 22, 0.92) !important;
            border: 1px solid var(--card-border) !important;
            min-width: 300px;
            box-shadow: 0 10px 40px rgba(0, 240, 255, 0.04) !important;
        }

        .reasoning-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }

        .reasoning-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--accent-warning);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-warning-glow);
            animation: pulseIndicator 1.2s infinite;
        }

        .reasoning-title {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .reasoning-steps {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .reasoning-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            transition: all 0.3s ease;
        }

        .reasoning-step.active {
            color: var(--accent-tertiary);
            text-shadow: 0 0 8px var(--accent-tertiary-glow);
        }

        .reasoning-step.active .step-bullet {
            color: var(--accent-tertiary);
            animation: blinkBullet 1s infinite alternate;
        }

        .reasoning-step.completed {
            color: var(--accent-success);
            text-shadow: 0 0 8px var(--accent-success-glow);
        }

        .reasoning-step.completed .step-bullet {
            color: var(--accent-success);
        }

        .step-bullet {
            font-size: 0.78rem;
        }

        @keyframes blinkBullet {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @keyframes pulseIndicator {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Floating Capsule Input */
        .input-area-wrapper {
            padding: 24px 30px;
            border-top: 1px solid var(--card-border);
            background: linear-gradient(360deg, rgba(14, 10, 32, 0.5), transparent);
        }

        .capsule-input-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 6px 12px;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .capsule-input-box:focus-within {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .capsule-symbol {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--accent-secondary);
            padding-left: 10px;
            user-select: none;
        }

        .capsule-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 0.95rem;
            padding: 10px 14px;
        }

        .capsule-send-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            outline: none;
            color: var(--bg-color);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .capsule-send-btn:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
            filter: brightness(1.15);
            transform: scale(1.02);
        }

        .capsule-send-btn:disabled {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 3. NEURAL TELEMETRY HUD (Right Panel) */
        .hud-panel {
            background: rgba(14, 10, 32, 0.6);
            backdrop-filter: blur(40px) saturate(160%);
            -webkit-backdrop-filter: blur(40px) saturate(160%);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-large);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .hud-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }

        .hud-title {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .hud-indicator-dot {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--accent-success);
        }

        .dot-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-success);
            box-shadow: 0 0 10px var(--accent-success-glow);
            animation: pulseIndicator 1.5s infinite;
        }

        .hud-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .hud-tile {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-medium);
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .hud-tile:hover {
            border-color: rgba(0, 240, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
        }

        .hud-tile-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .hud-tile-val {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-secondary);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            margin-top: 8px;
        }

        .hud-tile.violet .hud-tile-val {
            color: var(--accent-primary);
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
        }

        .hud-tile.pink .hud-tile-val {
            color: var(--accent-tertiary);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        .hud-progress-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .hud-progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .cyan-fill { background: var(--accent-secondary); }
        .violet-fill { background: var(--accent-primary); }
        .pink-fill { background: var(--accent-tertiary); }

        .terminal-logs-hud {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-medium);
            padding: 16px;
            overflow: hidden;
        }

        .terminal-hud-header {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .terminal-hud-logs {
            flex: 1;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-line {
            word-break: break-all;
            white-space: pre-wrap;
        }

        .log-ts { color: var(--text-muted); margin-right: 6px; }
        .log-sys { color: var(--accent-primary); font-weight: 700; }
        .log-db { color: var(--accent-warning); font-weight: 700; }
        .log-net { color: var(--accent-secondary); font-weight: 700; }
        .log-agent { color: var(--accent-tertiary); font-weight: 700; }

        .wipe-system-btn {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 14px;
            border-radius: 20px;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .wipe-system-btn:hover {
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            border-color: transparent;
            transform: scale(1.02);
        }

        /* Scrollbars custom styling */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }
    </style>
</head>
<body>

    <!-- Dynamic Neon Mesh Particles -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- Capsule Container -->
    <div class="console-container">

        <!-- 1. LEFT NEURAL DOCK (Vertical Actions) -->
        <div class="dock-panel">
            <div class="dock-brand" onclick="initSessionArchives()" title="Reload System">Q</div>
            
            <div class="dock-items">
                <div class="dock-btn active" id="btn-mode-rest" onclick="setMode('rest')" data-tooltip="Stateless REST Mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
                </div>
                <div class="dock-btn" id="btn-mode-ws" onclick="setMode('ws')" data-tooltip="Websocket Stream Mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08-.2"></path><path d="M1.42 9a16 16 0 0 1 21.16.08"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                </div>
                <div class="dock-btn" onclick="createNewSession()" data-tooltip="New Session ID">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
            </div>

            <div class="dock-btn" onclick="window.open('/docs', '_blank')" data-tooltip="View Swagger Docs">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </div>
        </div>

        <!-- 2. CORE VIEWPORT (Main Chat & AI Core Interface) -->
        <div class="core-viewport">
            
            <!-- Floating Space Header -->
            <div class="core-header">
                <div class="core-identity">
                    <h1 class="core-title">QUANTUM OPERATIONS</h1>
                    <span class="core-subtitle" id="channel-type-label">HTTP-REST CHANNEL</span>
                </div>

                <div class="orb-control-hub">
                    <div class="orb-status">
                        <span class="orb-status-text">Cognitive State</span>
                        <span class="orb-status-val" id="core-state-label">CORE IDLE</span>
                    </div>
                    <div class="quantum-orb-wrapper">
                        <div class="quantum-orb" id="quantum-consciousness-orb"></div>
                    </div>
                </div>
            </div>

            <!-- Scrollable Session Archives Bar -->
            <div class="sessions-tray" id="sessions-tray-container">
                <!-- Dynamically filled sessions will go here -->
            </div>

            <!-- Dynamic Chat Viewport -->
            <div class="chat-viewport" id="chat-messages-viewport">
                <div class="chat-row system">
                    <div class="chat-bubble">
                        SYSTEM ARCH: Quantum Neural core booted. Persistent memory map online.
                    </div>
                </div>
            </div>

            <!-- Capsule Input Bar -->
            <div class="input-area-wrapper">
                <div class="capsule-input-box">
                    <span class="capsule-symbol">❯</span>
                    <input 
                        type="text" 
                        id="console-input-box" 
                        class="capsule-input" 
                        placeholder="Instruct Quantum core..."
                        onkeydown="handleInputKeyDown(event)"
                    >
                    <button class="capsule-send-btn" id="send-button" onclick="sendMessage()">
                        Execute
                    </button>
                </div>
            </div>
        </div>

        <!-- 3. NEURAL TELEMETRY HUD (Telemetry Panel) -->
        <div class="hud-panel">
            <div class="hud-header">
                <span class="hud-title">System Telemetry</span>
                <div class="hud-indicator-dot">
                    <div class="dot-pulse"></div>
                    <span>ONLINE</span>
                </div>
            </div>

            <!-- Grid metrics -->
            <div class="hud-grid">
                <div class="hud-tile">
                    <span class="hud-tile-title">Uptime</span>
                    <span class="hud-tile-val" id="telemetry-uptime">00:00</span>
                </div>
                
                <div class="hud-tile violet">
                    <span class="hud-tile-title">Temp</span>
                    <span class="hud-tile-val">0.2</span>
                </div>

                <div class="hud-tile pink" style="grid-column: span 2;">
                    <span class="hud-tile-title">Memory blocks</span>
                    <span class="hud-tile-val" id="telemetry-memory">0</span>
                    <div class="hud-progress-bg">
                        <div class="hud-progress-fill pink-fill" id="telemetry-memory-chart" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="hud-tile" style="grid-column: span 2;">
                    <span class="hud-tile-title">API Latency</span>
                    <span class="hud-tile-val" id="telemetry-latency">0 ms</span>
                    <div class="hud-progress-bg">
                        <div class="hud-progress-fill cyan-fill" id="telemetry-latency-chart" style="width: 5%;"></div>
                    </div>
                </div>
            </div>

            <!-- Console logs panel -->
            <div class="terminal-logs-hud">
                <div class="terminal-hud-header">
                    <span>TELEMETRY INTERCEPT LOGS</span>
                    <span style="color: var(--accent-tertiary); animation: blinkBullet 1s infinite alternate;">● INTERCEPT</span>
                </div>
                <div class="terminal-hud-logs" id="telemetry-logs-container">
                    <!-- Logs dynamically appended here -->
                </div>
            </div>

            <button class="wipe-system-btn" onclick="clearSessionHistory()">
                Wipe Memory Core
            </button>
        </div>

    </div>

    <!-- Hidden element to reference session id securely -->
    <input type="hidden" id="session-id-input" value="session-default">

    <script>
        let currentMode = 'rest';
        let wsConnection = null;
        let dbMessageCount = 0;
        let uptimeSeconds = 0;
        let sessions = [];
        let thinkingTimer = null;

        const messagesViewport = document.getElementById('chat-messages-viewport');
        const consoleInputBox = document.getElementById('console-input-box');
        const sendButton = document.getElementById('send-button');
        const sessionInput = document.getElementById('session-id-input');
        const consciousnessOrb = document.getElementById('quantum-consciousness-orb');
        const coreStateLabel = document.getElementById('core-state-label');
        const channelTypeLabel = document.getElementById('channel-type-label');
        const logsContainer = document.getElementById('telemetry-logs-container');
        const uptimeIndicator = document.getElementById('telemetry-uptime');
        const metricMemoryBlocks = document.getElementById('telemetry-memory');
        const metricMemoryChart = document.getElementById('telemetry-memory-chart');
        const metricLatency = document.getElementById('telemetry-latency');
        const metricLatencyChart = document.getElementById('telemetry-latency-chart');
        const sessionsTray = document.getElementById('sessions-tray-container');

        // Uptime counter
        setInterval(() => {
            uptimeSeconds++;
            const mins = String(Math.floor(uptimeSeconds / 60)).padStart(2, '0');
            const secs = String(uptimeSeconds % 60).padStart(2, '0');
            uptimeIndicator.textContent = `${mins}:${secs}`;
        }, 1000);

        // Initial Boot
        logEvent('sys', 'SYSTEM Booting Operations Console client...');
        logEvent('db', 'DB SQLite mapped to live_assistant.db');
        logEvent('sys', 'REST API channels loaded at GET / & POST /api/chat');
        logEvent('sys', 'WebSocket stream stub listening at /ws/live/');
        initSessionArchives();

        function logEvent(tag, content) {
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = 'log-line';
            
            let tagSpan = '';
            if (tag === 'sys') tagSpan = `<span class="log-sys">[SYS]</span>`;
            if (tag === 'db') tagSpan = `<span class="log-db">[DB]</span>`;
            if (tag === 'net') tagSpan = `<span class="log-net">[NET]</span>`;
            if (tag === 'agent') tagSpan = `<span class="log-agent">[AGENT]</span>`;

            entry.innerHTML = `<span class="log-ts">${time}</span> ${tagSpan} ${content}`;
            logsContainer.appendChild(entry);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        // --- Session Archives Manager ---
        function initSessionArchives() {
            const stored = localStorage.getItem('assistant_sessions');
            if (stored) {
                try {
                    sessions = JSON.parse(stored);
                } catch(e) {
                    sessions = [];
                }
            }
            
            if (sessions.length === 0) {
                sessions = ['session-default'];
                saveSessionsToStorage();
            }

            renderSessionTray();
            selectSession(sessions[0]);
        }

        function saveSessionsToStorage() {
            localStorage.setItem('assistant_sessions', JSON.stringify(sessions));
        }

        function renderSessionTray() {
            sessionsTray.innerHTML = '';
            
            sessions.forEach(sid => {
                const activeClass = sid === sessionInput.value ? 'active' : '';
                const item = document.createElement('div');
                item.className = `tray-item ${activeClass}`;
                item.onclick = () => selectSession(sid);
                
                const label = document.createElement('span');
                label.textContent = sid;
                
                const deleteBtn = document.createElement('span');
                deleteBtn.className = 'tray-delete';
                deleteBtn.textContent = '×';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteSessionArchive(sid);
                };
                
                item.appendChild(label);
                item.appendChild(deleteBtn);
                sessionsTray.appendChild(item);
            });
        }

        function createNewSession() {
            const id = prompt("Enter a unique Session ID (or leave blank to generate):");
            let sid = id ? id.trim().replace(/\s+/g, '-') : '';
            if (id !== null) {
                if (!sid) {
                    const rand = Math.random().toString(36).substring(2, 10);
                    sid = `session-${rand}`;
                }
                
                if (!sessions.includes(sid)) {
                    sessions.unshift(sid);
                    saveSessionsToStorage();
                }
                
                selectSession(sid);
                logEvent('sys', `Created and switched to session: ${sid}`);
            }
        }

        async function selectSession(sid) {
            sessionInput.value = sid;
            renderSessionTray();
            logEvent('sys', `Selected Session: ${sid}`);
            
            messagesViewport.innerHTML = '';
            appendSystemMessage(`Retrieving session history for ${sid}...`);
            
            try {
                const response = await fetch(`/api/chat/${sid}`);
                messagesViewport.innerHTML = '';
                if (response.ok) {
                    const history = await response.json();
                    dbMessageCount = history.length;
                    metricMemoryBlocks.textContent = dbMessageCount;
                    const percentage = Math.min(dbMessageCount * 5, 100);
                    metricMemoryChart.style.width = `${percentage}%`;

                    if (history.length === 0) {
                        appendSystemMessage(`SYSTEM: Session initialized. Persistent memory empty for ${sid}.`);
                    } else {
                        history.forEach(msg => {
                            appendMessage(msg.role === 'user' ? 'user' : 'assistant', msg.content);
                        });
                        appendSystemMessage(`SYSTEM: Retrieved ${history.length} database logs for session ${sid}.`);
                    }
                } else {
                    logEvent('sys', `Failed to load history for ${sid}. Code: ${response.status}`);
                    appendSystemMessage(`SYSTEM ERROR: Could not sync history from server.`);
                }
            } catch(e) {
                messagesViewport.innerHTML = '';
                logEvent('sys', `History sync connection refused: ${e.message}`);
                appendSystemMessage(`SYSTEM ERROR: Connection refused while retrieving logs.`);
            }

            if (currentMode === 'ws') {
                connectWebSocket();
            }
        }

        async function deleteSessionArchive(sid) {
            if (confirm(`Are you sure you want to permanently delete session memory for '${sid}'?`)) {
                logEvent('db', `Initiating purge for session ${sid}`);
                try {
                    const response = await fetch(`/api/chat/${sid}`, { method: 'DELETE' });
                    if (response.ok) {
                        logEvent('db', `Successfully wiped memory archives for ${sid}`);
                        
                        sessions = sessions.filter(s => s !== sid);
                        if (sessions.length === 0) {
                            sessions = ['session-default'];
                        }
                        saveSessionsToStorage();
                        
                        if (sessionInput.value === sid) {
                            selectSession(sessions[0]);
                        } else {
                            renderSessionTray();
                        }
                    } else {
                        logEvent('sys', `Database clear failed on server. Code: ${response.status}`);
                    }
                } catch(e) {
                    logEvent('sys', `Database purge connection failed: ${e.message}`);
                }
            }
        }

        function setMode(mode) {
            if (currentMode === mode) return;

            document.getElementById('btn-mode-rest').classList.toggle('active', mode === 'rest');
            document.getElementById('btn-mode-ws').classList.toggle('active', mode === 'ws');

            currentMode = mode;

            if (mode === 'ws') {
                channelTypeLabel.textContent = "WS-STREAM CHANNEL";
                channelTypeLabel.style.color = "var(--accent-secondary)";
                logEvent('sys', 'Shifting client pathway to WebSocket stream...');
                connectWebSocket();
            } else {
                channelTypeLabel.textContent = "HTTP-REST CHANNEL";
                channelTypeLabel.style.color = "var(--accent-primary)";
                logEvent('sys', 'Shifting client pathway to Stateless REST...');
                disconnectWebSocket();
                appendSystemMessage("Switched path to REST execution. Socket closed.");
            }
        }

        // --- WebSocket connection ---
        function connectWebSocket() {
            disconnectWebSocket();
            const sessionId = sessionInput.value.trim() || 'session-default';
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/live/${sessionId}`;

            logEvent('net', `Initiating WebSocket handshake: ${wsUrl}`);
            coreStateLabel.textContent = "CORE CONNECTING...";
            consciousnessOrb.className = "quantum-orb thinking";

            try {
                wsConnection = new WebSocket(wsUrl);

                wsConnection.onopen = () => {
                    logEvent('net', 'WebSocket handshake verified. Link established.');
                    coreStateLabel.textContent = "SOCKET ACTIVE";
                    consciousnessOrb.className = "quantum-orb";
                };

                wsConnection.onmessage = (event) => {
                    setThinking(false);
                    hideThinkingCard();
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'status') {
                            logEvent('net', `WS Status: ${data.content}`);
                            appendSystemMessage(`STATUS: ${data.content}`);
                        } else if (data.type === 'response') {
                            logEvent('agent', `WS Response payload successfully received.`);
                            typeMessage('assistant', data.content);
                            incrementMemoryBlock();
                        }
                    } catch (e) {
                        logEvent('agent', `WS Raw text response received.`);
                        typeMessage('assistant', event.data);
                    }
                };

                wsConnection.onclose = () => {
                    logEvent('net', 'WebSocket channel closed by host/client.');
                    if (currentMode === 'ws') {
                        coreStateLabel.textContent = "SOCKET CLOSED";
                        consciousnessOrb.className = "quantum-orb";
                        appendSystemMessage("SYSTEM: WebSockets stream closed.");
                    }
                };

                wsConnection.onerror = (err) => {
                    logEvent('net', `SOCKET ERROR: Connection failed.`);
                    coreStateLabel.textContent = "SOCKET ERROR";
                    consciousnessOrb.className = "quantum-orb";
                };

            } catch (e) {
                logEvent('net', `SOCKET FATAL: ${e.message}`);
            }
        }

        function disconnectWebSocket() {
            if (wsConnection) {
                wsConnection.close();
                wsConnection = null;
            }
        }

        // --- Core Message Actions ---
        function setThinking(active) {
            if (active) {
                coreStateLabel.textContent = "CORE EXECUTING...";
                consciousnessOrb.className = "quantum-orb thinking";
                sendButton.disabled = true;
            } else {
                coreStateLabel.textContent = currentMode === 'ws' ? "SOCKET ACTIVE" : "CORE IDLE";
                consciousnessOrb.className = "quantum-orb";
                sendButton.disabled = false;
            }
        }

        function incrementMemoryBlock() {
            dbMessageCount += 2;
            metricMemoryBlocks.textContent = dbMessageCount;
            const percentage = Math.min(dbMessageCount * 5, 100);
            metricMemoryChart.style.width = `${percentage}%`;
        }

        // --- Cognitive Thinking Indicators ---
        function showThinkingCard() {
            hideThinkingCard();

            const card = document.createElement('div');
            card.className = 'chat-row assistant thinking-card-row';
            card.id = 'thinking-indicator-card';
            
            card.innerHTML = `
                <div class="chat-bubble reasoning-bubble">
                    <div class="reasoning-header">
                        <div class="reasoning-indicator"></div>
                        <div class="reasoning-title">Cognitive Operations</div>
                    </div>
                    <div class="reasoning-steps">
                        <div class="reasoning-step active" id="step-analyze">
                            <span class="step-bullet">■</span>
                            <span class="step-text">Analyzing query intent...</span>
                        </div>
                        <div class="reasoning-step" id="step-search">
                            <span class="step-bullet">□</span>
                            <span class="step-text">Searching the web...</span>
                        </div>
                        <div class="reasoning-step" id="step-verify">
                            <span class="step-bullet">□</span>
                            <span class="step-text">Verifying and filtering facts...</span>
                        </div>
                        <div class="reasoning-step" id="step-respond">
                            <span class="step-bullet">□</span>
                            <span class="step-text">Synthesizing final response...</span>
                        </div>
                    </div>
                </div>
            `;
            
            messagesViewport.appendChild(card);
            messagesViewport.scrollTop = messagesViewport.scrollHeight;

            let currentStep = 0;
            const steps = [
                { id: 'step-analyze' },
                { id: 'step-search' },
                { id: 'step-verify' },
                { id: 'step-respond' }
            ];

            thinkingTimer = setInterval(() => {
                if (currentStep < steps.length - 1) {
                    const prevEl = document.getElementById(steps[currentStep].id);
                    if (prevEl) {
                        prevEl.className = 'reasoning-step completed';
                        prevEl.querySelector('.step-bullet').textContent = '■';
                    }
                    
                    currentStep++;
                    const nextEl = document.getElementById(steps[currentStep].id);
                    if (nextEl) {
                        nextEl.className = 'reasoning-step active';
                        nextEl.querySelector('.step-bullet').textContent = '■';
                    }
                }
            }, 1000);
        }

        function hideThinkingCard() {
            if (thinkingTimer) {
                clearInterval(thinkingTimer);
                thinkingTimer = null;
            }
            const el = document.getElementById('thinking-indicator-card');
            if (el) {
                el.remove();
            }
        }

        async function sendMessage() {
            const message = consoleInputBox.value.trim();
            if (!message) return;

            const sessionId = sessionInput.value.trim() || 'session-default';
            appendMessage('user', message);
            consoleInputBox.value = '';
            setThinking(true);
            showThinkingCard();

            const startTime = performance.now();

            if (currentMode === 'ws') {
                if (wsConnection && wsConnection.readyState === WebSocket.OPEN) {
                    logEvent('net', `Piping payload: "${message.substring(0, 20)}..." over socket`);
                    wsConnection.send(message);
                } else {
                    logEvent('sys', 'ERROR: Pipeline is down. Message dropped.');
                    appendSystemMessage("SYSTEM ERROR: WebSocket not connected.");
                    setThinking(false);
                    hideThinkingCard();
                }
            } else {
                logEvent('net', `Dispatching POST /api/chat. Payload size: ${message.length} bytes`);
                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            session_id: sessionId,
                            message: message
                        })
                    });

                    const duration = Math.round(performance.now() - startTime);
                    metricLatency.textContent = `${duration} ms`;
                    const chartWidth = Math.min((duration / 2000) * 100, 100);
                    metricLatencyChart.style.width = `${chartWidth}%`;

                    setThinking(false);
                    hideThinkingCard();
                    
                    if (response.ok) {
                        const data = await response.json();
                        logEvent('agent', `REST Response payload received (took ${duration}ms)`);
                        typeMessage('assistant', data.response);
                        incrementMemoryBlock();
                    } else {
                        const errData = await response.json().catch(() => ({}));
                        logEvent('net', `SERVER RETURNED ERROR ${response.status}`);
                        appendMessage('assistant', `SYSTEM RESPONSE ERROR: ${errData.detail || 'Internal service fault.'}`);
                    }
                } catch (err) {
                    setThinking(false);
                    hideThinkingCard();
                    logEvent('net', `CONNECTION REFUSED: ${err.message}`);
                    appendMessage('assistant', `CLIENT NETWORK ERROR: Could not resolve gateway host.`);
                }
            }
        }

        async function clearSessionHistory() {
            const sessionId = sessionInput.value.trim() || 'session-default';
            setThinking(true);
            logEvent('db', `Executing memory wipe request for session ${sessionId}`);

            try {
                const response = await fetch(`/api/chat/${sessionId}`, {
                    method: 'DELETE'
                });
                setThinking(false);
                if (response.ok) {
                    logEvent('db', `Wiped database records for address ${sessionId}`);
                    dbMessageCount = 0;
                    metricMemoryBlocks.textContent = "0";
                    metricMemoryChart.style.width = "0%";
                    
                    messagesViewport.innerHTML = `
                        <div class="chat-row system">
                            <div class="chat-bubble">
                                SYSTEM: SQLite database purged for session ${sessionId}. Awaiting input.
                            </div>
                        </div>
                    `;
                } else {
                    logEvent('sys', `Database clear failed. Gateway responded with code ${response.status}`);
                }
            } catch (err) {
                setThinking(false);
                logEvent('sys', `Database purge connection fault: ${err.message}`);
            }
        }

        function handleInputKeyDown(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        // --- Render UI Helpers ---
        function typeMessage(sender, text) {
            const row = document.createElement('div');
            row.className = `chat-row ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            
            if (sender === 'assistant') {
                bubble.innerHTML = '';
                bubble.classList.add('typing-effect');
            }

            const time = document.createElement('span');
            time.className = 'bubble-time';
            time.textContent = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit' });

            row.appendChild(bubble);
            messagesViewport.appendChild(row);
            messagesViewport.scrollTop = messagesViewport.scrollHeight;

            let index = 0;
            const speed = 10;
            
            function type() {
                if (index < text.length) {
                    bubble.innerHTML = text.substring(0, index + 1).replace(/\n/g, '<br>');
                    bubble.appendChild(time);
                    index += 2;
                    messagesViewport.scrollTop = messagesViewport.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    bubble.innerHTML = text.replace(/\n/g, '<br>');
                    bubble.appendChild(time);
                    bubble.classList.remove('typing-effect');
                    messagesViewport.scrollTop = messagesViewport.scrollHeight;
                }
            }
            type();
        }

        function appendMessage(sender, text) {
            const row = document.createElement('div');
            row.className = `chat-row ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.innerHTML = text.replace(/\n/g, '<br>');

            const time = document.createElement('span');
            time.className = 'bubble-time';
            time.textContent = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit' });

            bubble.appendChild(time);
            row.appendChild(bubble);
            messagesViewport.appendChild(row);
            messagesViewport.scrollTop = messagesViewport.scrollHeight;
        }

        function appendSystemMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row system';

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.textContent = text;

            row.appendChild(bubble);
            messagesViewport.appendChild(row);
            messagesViewport.scrollTop = messagesViewport.scrollHeight;
        }
    </script>
</body>
</html>
